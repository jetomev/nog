# nog configuration file
# /etc/nog/nog.conf

[general]
version = "0.6.0"
log_level = "info"

[paths]
tier_pins   = "/etc/nog/tier-pins.toml"
pacman_conf = "/etc/pacman.conf"
log_file    = "/var/log/nog.log"

[repos]
staging = "https://repo.kognog.org/staging"
testing = "https://repo.kognog.org/testing"
stable  = "https://repo.kognog.org/stable"

[holds]
tier1_days = 0
tier2_days = 10
tier3_days = 3
