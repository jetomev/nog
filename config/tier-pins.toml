[tier1]
# manual_signoff = false (default): Tier 1 auto-updates after the 30-day hold window.
# Set to true for expert mode — Tier 1 stays wholesale held until `nog unlock <pkg> --promote`.
manual_signoff = false
packages = [
    "linux",
    "linux-zen",
    "linux-lts",
    "linux-hardened",
    "systemd",
    "systemd-libs",
    "glibc",
    "grub",
    "efibootmgr",
    "mkinitcpio",
    "pacman",
    "mesa",
]

[tier2]
manual_signoff = false
packages = [
    "plasma-meta",
    "plasma-desktop",
    "sddm",
    "pipewire",
    "pipewire-pulse",
    "wireplumber",
    "networkmanager",
    "firefox",
    "dolphin",
    "konsole",
    "kate",
    "grubforge",
    "alacritty",
    "fish",
    "alacrittyforge",
]

[tier3]
manual_signoff = false
# everything not listed above falls here automatically

# Optional. Bundle packages that must move together. Members inherit the
# highest tier among any other group member. Useful for non-standard kernel
# names whose headers don't follow the `<kernel>-headers` convention, or for
# pulling extra packages (e.g. nvidia-utils) into a kernel's tier.
#
# Standard Arch kernels (linux, linux-zen, linux-lts, linux-hardened) do NOT
# need a group — nog auto-couples `<kernel>-headers` to its Tier 1 kernel.
#
# [groups]
# cachyos-bundle = [
#     "linux-cachyos",
#     "linux-cachyos-headers",
#     "linux-cachyos-cacule-headers",
# ]